description: A credential for external service
type: object
required:
  - service
  - owning_user
properties:
  id:
    type: string
    example: 99-9999-9999-99
  name:
    type: string
    example: Cred 1
  service:
    type: string
    enum:
      - canvas
      - gradescope
    example: canvas
  api_key:
    type: string
    example: a super secure key
  private:
    type: boolean
    example: true
  active:
    type: boolean
    example: true
  owning_user:
    $ref: ./User.yml
