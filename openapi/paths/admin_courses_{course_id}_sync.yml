post:
  tags:
    - admin
  operationId: sync_course
  summary: Sync with established course controller
  description: |
    Syncs with a course in the controller.
  security:
    - openIDC:
        - admin:write
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CourseSyncTask.yml
  responses:
    '202':
      description: Accepted
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Task.yml
    '403':
      description: An authentication error occurred
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: Canvas Service
            error_message: 'Error: invalid token'
    '404':
      description: Course Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_course
            error_message: Course '999-9999-9999-99' does not exist
