put:
  tags:
    - admin
  operationId: make_admin
  summary: Make a user an admin
  description: >
    Make a user an admin.

    This will fail if the account is disabled or if the requested user is
    enrolled as a student in any classes
  security:
    - openIDC:
        - admin:write
  parameters:
    - name: cwid
      in: path
      required: true
      schema:
        type: string
        example: '99999999'
  responses:
    '202':
      description: Accepted
    '404':
      description: User not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_user
            error_message: Failed to update user
