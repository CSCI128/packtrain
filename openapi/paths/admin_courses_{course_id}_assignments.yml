put:
  tags:
    - admin
  operationId: update_assignment
  summary: Update an assignment in a course
  description: |
    Update an assignment in a course
  security:
    - openIDC:
        - admin:write
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Assignment.yml
  responses:
    '201':
      description: Accepted
    '404':
      description: Course Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_course
            error_message: Course '999-9999-9999-99' does not exist
post:
  tags:
    - admin
  operationId: add_assignment
  summary: Add assignment to a course
  description: |
    Add assignments to a course.
    If any assignment already exist in the class (based off of the TODO), 
    their information will be updated.
  security:
    - openIDC:
        - admin:write
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Assignment.yml
  responses:
    '201':
      description: Accepted
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Assignment.yml
    '404':
      description: Course Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_course
            error_message: Course '999-9999-9999-99' does not exist
