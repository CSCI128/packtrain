put:
  tags:
    - admin
  operationId: disable_course
  summary: Disable the specified course.
  description: |
    Disable the specified course.
  security:
    - openIDC:
        - admin:write
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
  responses:
    '202':
      description: Accepted
    '404':
      description: Course Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_course
            error_message: Course '999-9999-9999-99' does not exist
