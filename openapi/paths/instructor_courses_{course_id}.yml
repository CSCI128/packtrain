get:
  tags:
    - instructor
  operationId: get_course_information_instructor
  summary: Get information for a course
  description: |
    Get information from a course from
    the instructor's perspective; returns
    members as an aggregate of all members
    in their sections.
  security:
    - openIDC:
        - instructor:read
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Course.yml
