get:
  tags:
    - user
  operationId: get_enrollments
  security:
    - openIDC:
        - user:read
  summary: Get all enrollments for a user
  description: |
    Gets all enrollments (classes) that a
    user is apart of.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Course.yml
    '404':
      description: User not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_user
            error_message: User '999-9999-9999-99' does not exist!
