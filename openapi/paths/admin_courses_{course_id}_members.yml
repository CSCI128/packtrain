get:
  tags:
    - admin
  operationId: get_members
  security:
    - openIDC:
        - admin:read
  summary: Get all members for a course
  description: >
    Gets all members for a course.

    Optional query params can be used to filter by TAs, Instructors, or
    Students.

    Can also be used to search by CWID or by name
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
    - name: enrollments
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - tas
            - instructors
            - students
    - name: name
      in: query
      required: false
      schema:
        type: string
        description: Part of (or full) name to search for
        example: Alex
    - name: cwid
      in: query
      required: false
      schema:
        type: string
        description: Part of (or full) cwid to search for
        example: '9999999'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/CourseMember.yml
    '404':
      description: Course Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_course
            error_message: Course '999-9999-9999-99' does not exist
post:
  tags:
    - admin
  operationId: add_course_member
  summary: Add a member to a course
  description: |
    Adds a member to a course. 
    If they already exist, the request is rejected.
    If the user does not exist in system, then the request is rejected.
  security:
    - openIDC:
        - admin:write
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CourseMember.yml
  responses:
    '201':
      description: Created
    '404':
      description: Course Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_course
            error_message: Course '999-9999-9999-99' does not exist
put:
  tags:
    - admin
  operationId: update_course_member
  summary: Updates a member's membership in a course
  description: |
    Updates a member in a course. If they do not exist, then they are rejected.
  security:
    - openIDC:
        - admin:write
  parameters:
    - name: course_id
      in: path
      required: true
      schema:
        type: string
        example: 999-9999-9999-99
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CourseMember.yml
  responses:
    '201':
      description: Created
    '404':
      description: Course Not Found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yml
          example:
            error_source: update_course
            error_message: Course '999-9999-9999-99' does not exist
